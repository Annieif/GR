name: Daily Chinese BERT Fine-tune + Evaluate (with MoE+Multi-LoRA)

on:
  # 每天 UTC 02:00 触发(北京时间 10:00),错峰使用 runner
  schedule:
    - cron: '0 2 * * *'
  # 支持手动触发,带参数
  workflow_dispatch:
    inputs:
      model_name:
        description: 'HuggingFace 上的 base 模型(纯 PyTorch)'
        required: false
        default: 'hfl/chinese-macbert-base'
      epochs:
        description: '训练轮数'
        required: false
        default: '3'
      batch_size:
        description: '每设备 batch size'
        required: false
        default: '16'
      use_lora:
        description: '启用 PEFT LoRA 微调'
        required: false
        default: false
        type: boolean
      lora_r:
        description: 'PEFT LoRA 秩'
        required: false
        default: '8'
      lora_alpha:
        description: 'PEFT LoRA alpha'
        required: false
        default: '16'
      lora_dropout:
        description: 'PEFT LoRA dropout'
        required: false
        default: '0.1'
      merge_lora:
        description: '训练后把 LoRA 合并回 base 并保存'
        required: false
        default: true
        type: boolean
      use_momo:
        description: '启用 MoE + Multi-LoRA(自定义 momo_lora.py)。默认开启,关掉可换 PEFT LoRA 或全参'
        required: false
        default: true
        type: boolean
      momo_n_experts:
        description: 'MoMo 专家数(仅在 use_momo=true 时生效)'
        required: false
        default: '4'
      momo_top_k:
        description: 'MoMo top-k 路由'
        required: false
        default: '2'
      momo_lora_r:
        description: 'MoMo 单个 LoRA expert 的秩'
        required: false
        default: '8'
      momo_lora_alpha:
        description: 'MoMo LoRA alpha'
        required: false
        default: '16'
      momo_target:
        description: 'MoMo 注入目标模块,逗号分隔(默认 query,value)'
        required: false
        default: 'query,value'
      momo_aux_alpha:
        description: 'MoMo 负载均衡 loss 系数'
        required: false
        default: '0.01'
      fetch_random_data:
        description: '本次运行是否拉取一个随机新数据集(默认开启,自动扩语料)'
        required: false
        default: true
        type: boolean
      max_random_samples:
        description: '随机拉取的数据集最多取多少条(默认 500,完整体验)'
        required: false
        default: '500'
      skip_base_eval:
        description: '跳过 base 模型评估(只评微调后,加速)'
        required: false
        default: false
        type: boolean
      push_to_hub:
        description: '推送到 HuggingFace Hub (需配置 HF_TOKEN secret)'
        required: false
        default: false
        type: boolean
      hub_repo_id:
        description: 'HF Hub 仓库 ID,形如 username/repo-name'
        required: false
        default: ''
      use_previous_model:
        description: '从上一个 Release 下载上次微调后的完整模型作为本次起点(默认开启,实现跨日累积微调)。第一次或找不到 release 时回退到 model_name'
        required: false
        default: true
        type: boolean
      auto_release:
        description: '本次跑完后自动创建 GitHub Release(包含 model.zip + 评估/训练日志)。默认开启'
        required: false
        default: true
        type: boolean
      release_zip_name:
        description: 'Release 附件 zip 文件名(默认 model.zip)'
        required: false
        default: 'model.zip'

# 防止旧 workflow 占用 runner
concurrency:
  group: daily-finetune
  cancel-in-progress: false

jobs:
  finetune:
    name: 每日中文 MLM 微调 + 评估(MoE+Multi-LoRA)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write   # 允许把日志推回 main
      actions: read

    steps:
      # ---------- 0. 释放磁盘 ----------
      - name: Free up disk space
        run: |
          echo "清理前:"
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf "$AGENT_TOOLSDIRECTORY/CodeQL" 2>/dev/null || true
          echo "清理后:"
          df -h /

      # ---------- 1. 拉取代码 ----------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------- 2. 准备 Python ----------
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # ---------- 3. 缓存 HuggingFace 模型 ----------
      - name: Cache HuggingFace model & tokenizer
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
          key: hf-${{ runner.os }}-${{ hashFiles('requirements.txt') }}-${{ github.event.inputs.model_name || 'hfl/chinese-macbert-base' }}
          restore-keys: |
            hf-${{ runner.os }}-${{ hashFiles('requirements.txt') }}-
            hf-${{ runner.os }}-

      # ---------- 3.5 缓存 previous_model(避免每次都重新下载)----------
      - name: Cache previous_model
        uses: actions/cache@v4
        with:
          path: previous_model
          key: prev-model-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            prev-model-${{ runner.os }}-

      # ---------- 4. 安装依赖 ----------
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "--- 关键版本 ---"
          python -c "import torch, transformers, datasets, peft; print(f'torch={torch.__version__}'); print(f'transformers={transformers.__version__}'); print(f'datasets={datasets.__version__}'); print(f'peft={peft.__version__}')"

      # ---------- 5. 检查数据 + 预校验候选池 ----------
      - name: Verify corpora + validate candidate pool
        run: |
          echo "--- 主语料 ---"; wc -l data/corpus.txt
          echo "--- 评估语料 ---"; wc -l data/eval.txt
          echo "--- 历史 extra corpora ---"; ls -la data/extra_corpora/ 2>/dev/null || echo "(无)"
          echo "--- 候选池大小 ---"; python -c "import json; print(len(json.load(open('data/dataset_pool.json'))))"
          echo "--- 已用 ---"; cat data/used_datasets.json
          echo ""
          echo ">>>>> 预校验候选池(列出无效的,但不中断 workflow)"
          python data/fetch_random_data.py --validate_only --max_samples 10 || echo "::warning::候选池里部分数据集失效(详见上方)"
          echo "<<<<< validate_only 完成"

      # ---------- 6. 拉取一个随机新数据集 ----------
      - name: Fetch random Chinese dataset
        if: github.event.inputs.fetch_random_data == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_DISABLE_PROGRESS_BARS: '1'
        run: |
          set -euo pipefail
          MAX="${{ github.event.inputs.max_random_samples || '300' }}"
          echo ">>>>> fetching a random dataset (max_samples=$MAX)"
          python data/fetch_random_data.py --max_samples "$MAX" --max_attempts 4
          echo "<<<<< fetch finished"
          echo "--- 拉取后状态 ---"
          cat data/used_datasets.json
          echo "--- 新增文件 ---"
          ls -la data/extra_corpora/ | tail -5

      # ---------- 6.5 下载上一个 release 的模型(实现跨日累积微调)----------
      - name: Download previous fine-tuned model from latest release
        if: github.event.inputs.use_previous_model == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          rm -rf previous_model
          echo ">>>>> 查找最新 release"
          # 找最近一个含 model.zip 的 release(忽略无 model.zip 的早期 release)
          TAG=$(gh release list --limit 30 --json tagName,assets \
                  --jq '.[] | select(.assets | length > 0) | .tagName' \
              | grep -E '^(daily|release)-' | head -n 1 || true)
          if [ -z "${TAG:-}" ]; then
            echo "::warning::未找到包含 model.zip 的历史 release,本次从 base 模型开始"
            echo "USE_PREV=false" >> "$GITHUB_ENV"
            exit 0
          fi
          echo ">>>>> 下载 release ${TAG} 的 model.zip"
          if ! gh release download "$TAG" --pattern "model.zip" --dir previous_zip --clobber; then
            echo "::warning::下载 model.zip 失败,回退到 base 模型"
            echo "USE_PREV=false" >> "$GITHUB_ENV"
            exit 0
          fi
          ls -la previous_zip/
          if [ ! -f previous_zip/model.zip ]; then
            echo "::warning::model.zip 不存在,回退到 base 模型"
            echo "USE_PREV=false" >> "$GITHUB_ENV"
            exit 0
          fi
          mkdir -p previous_model
          unzip -q previous_zip/model.zip -d previous_model
          # 校验是否是 HF 完整模型(必须有 config.json)
          if [ ! -f previous_model/config.json ]; then
            echo "::warning::解压后无 config.json,不是有效 HF 模型,回退到 base 模型"
            rm -rf previous_model
            echo "USE_PREV=false" >> "$GITHUB_ENV"
            exit 0
          fi
          echo ">>>>> previous_model 准备就绪:"
          ls previous_model/
          echo "PREV_TAG=$TAG" >> "$GITHUB_ENV"
          echo "USE_PREV=true" >> "$GITHUB_ENV"

      # ---------- 6.6 验证 previous_model 状态 ----------
      - name: Verify previous_model ready
        if: always() && github.event.inputs.use_previous_model == 'true'
        run: |
          echo "USE_PREV=${USE_PREV:-false}"
          echo "PREV_TAG=${PREV_TAG:-}"
          if [ "${USE_PREV:-false}" = "true" ] && [ -d previous_model ] && [ -f previous_model/config.json ]; then
            echo "✅ previous_model 准备就绪,内容如下:"
            ls -lh previous_model/ | head -20
            # 打印 base model type 验证是 HF 完整模型
            python -c "import json; cfg=json.load(open('previous_model/config.json')); print('model_type=', cfg.get('model_type')); print('arch=', cfg.get('architectures'))"
          else
            echo "⚠️ previous_model 不可用,本次从 base 模型开始"
          fi

      # ---------- 7. 跑微调 ----------
      - name: Run MLM fine-tuning
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_DISABLE_PROGRESS_BARS: '1'
          TRANSFORMERS_VERBOSITY: info
          TOKENIZERS_PARALLELISM: 'false'
        run: |
          set -euo pipefail
          if [ "${USE_PREV:-false}" = "true" ] && [ -d previous_model ] && [ -f previous_model/config.json ]; then
            echo ">>>>> 使用上一个 release 的模型作为起点: previous_model/"
            MODEL_NAME="previous_model"
          else
            MODEL_NAME="${{ github.event.inputs.model_name || 'hfl/chinese-macbert-base' }}"
          fi
          EPOCHS="${{ github.event.inputs.epochs || '3' }}"
          BATCH_SIZE="${{ github.event.inputs.batch_size || '16' }}"
          USE_LORA="${{ github.event.inputs.use_lora }}"
          USE_MOMO="${{ github.event.inputs.use_momo }}"

          EXTRA=()
          if [ "$USE_LORA" = "true" ]; then
            EXTRA+=(--use_lora
                    --lora_r "${{ github.event.inputs.lora_r || '8' }}"
                    --lora_alpha "${{ github.event.inputs.lora_alpha || '16' }}"
                    --lora_dropout "${{ github.event.inputs.lora_dropout || '0.1' }}")
            if [ "${{ github.event.inputs.merge_lora }}" = "true" ]; then
              EXTRA+=(--merge_lora)
            fi
          fi
          if [ "$USE_MOMO" = "true" ]; then
            EXTRA+=(--use_momo
                    --momo_n_experts "${{ github.event.inputs.momo_n_experts || '4' }}"
                    --momo_top_k "${{ github.event.inputs.momo_top_k || '2' }}"
                    --momo_lora_r "${{ github.event.inputs.momo_lora_r || '8' }}"
                    --momo_lora_alpha "${{ github.event.inputs.momo_lora_alpha || '16' }}"
                    --momo_target "${{ github.event.inputs.momo_target || 'query,value' }}"
                    --momo_aux_alpha "${{ github.event.inputs.momo_aux_alpha || '0.01' }}")
          fi

          echo ">>>>> start training: model=$MODEL_NAME epochs=$EPOCHS bs=$BATCH_SIZE lora=$USE_LORA momo=$USE_MOMO"
          python train.py \
            --model_name "$MODEL_NAME" \
            --data_path data/corpus.txt \
            --extra_corpus_dir data/extra_corpora \
            --output_dir output \
            --epochs "$EPOCHS" \
            --batch_size "$BATCH_SIZE" \
            --lr 5e-5 \
            --max_len 128 \
            --seed 42 \
            "${EXTRA[@]}"
          echo "<<<<< training finished"

      # ---------- 8. 评估 ----------
      - name: Run evaluation
        env:
          HF_HUB_DISABLE_PROGRESS_BARS: '1'
          TOKENIZERS_PARALLELISM: 'false'
        run: |
          set -euo pipefail
          if [ "${USE_PREV:-false}" = "true" ] && [ -d previous_model ] && [ -f previous_model/config.json ]; then
            echo ">>>>> 评估 base = previous_model (上一个 release 的模型)"
            MODEL_NAME="previous_model"
          else
            MODEL_NAME="${{ github.event.inputs.model_name || 'hfl/chinese-macbert-base' }}"
          fi
          SKIP_BASE="${{ github.event.inputs.skip_base_eval }}"

          EXTRA=()
          if [ "$SKIP_BASE" = "true" ]; then
            EXTRA+=(--skip_base)
          fi

          echo ">>>>> start evaluation"
          python evaluate.py \
            --base_model "$MODEL_NAME" \
            --ft_model output \
            --eval_data data/eval.txt \
            --report_path output/eval_report.json \
            --batch_size 16 \
            "${EXTRA[@]}"
          echo "<<<<< evaluation finished"
          python - <<'PY'
          import json
          with open("output/eval_report.json", "r", encoding="utf-8") as f:
              r = json.load(f)
          print("=== Eval Summary ===")
          for who in ("base", "finetuned"):
              if who not in r: continue
              x = r[who]
              print(f"[{who}] ppl={x.get('perplexity')}  top1={x.get('top1_acc')}  top5={x.get('top5_acc')}")
          if "comparison" in r and r["comparison"]:
              c = r["comparison"].get("perplexity", {})
              if c:
                  print(f"  Δ ppl: {c.get('base')} -> {c.get('ft')}  ({c.get('delta'):+.4f}, better={c.get('better')})")
          PY

      # ---------- 9. 备份训练/评估日志 ----------
      - name: Archive training & eval logs
        if: always()
        run: |
          mkdir -p logs/history
          ts=$(date -u +%Y%m%d_%H%M%S)
          [ -f output/training_log.json ] && cp output/training_log.json "logs/history/${ts}_training_log.json"
          [ -f output/eval_report.json ]   && cp output/eval_report.json   "logs/history/${ts}_eval_report.json"
          python - <<'PY'
          import json, os, datetime
          ts = datetime.datetime.utcnow().strftime("%Y%m%d_%H%M%S")
          summary = {"timestamp": ts}
          for name, p in [("train", "output/training_log.json"), ("eval", "output/eval_report.json")]:
              if os.path.exists(p):
                  with open(p, "r", encoding="utf-8") as f:
                      d = json.load(f)
                  if name == "train":
                      summary["train_loss"] = d.get("train_loss")
                      summary["train_runtime_sec"] = d.get("train_runtime_sec")
                      summary["mode"] = d.get("mode")
                      summary["use_momo"] = d.get("use_momo", False)
                      summary["n_corpus_files"] = d.get("n_corpus_files")
                      summary["n_samples"] = d.get("n_samples")
                  else:
                      summary["ppl_base"]   = d.get("base", {}).get("perplexity")
                      summary["ppl_ft"]     = d.get("finetuned", {}).get("perplexity")
                      summary["top1_ft"]    = d.get("finetuned", {}).get("top1_acc")
                      summary["top5_ft"]    = d.get("finetuned", {}).get("top5_acc")
          out = f"logs/history/{ts}_summary.json"
          with open(out, "w", encoding="utf-8") as f:
              json.dump(summary, f, ensure_ascii=False, indent=2)
          print("Wrote", out)
          PY

      # ---------- 10. 上传模型为 artifact ----------
      - name: Upload fine-tuned model
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: finetuned-model-${{ github.run_id }}
          path: output/
          retention-days: 30
          if-no-files-found: warn

      # ---------- 11. 上传日志为 artifact ----------
      - name: Upload training & eval logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_id }}
          path: logs/
          retention-days: 90
          if-no-files-found: warn

      # ---------- 11.5 打包模型并发布为 GitHub Release ----------
      - name: Package model and create GitHub Release
        if: success() && github.event.inputs.auto_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ ! -d output ]; then
            echo "::error::output/ 不存在,无法打包"
            exit 1
          fi
          cd output
          # 把整个 output/ 打包成 model.zip(里面就是上一版本 HF 模型 + tokenizer + 训练日志 + 评估报告)
          ZIP_NAME="${{ github.event.inputs.release_zip_name || 'model.zip' }}"
          # 排除大体积的中间 checkpoint(若有)和 __pycache__
          zip -r "../${ZIP_NAME}" . \
            -x "checkpoint-*/*" "runs/*" "*.bin" "__pycache__/*" \
            > /dev/null
          cd ..
          ls -lh "${ZIP_NAME}"
          # 生成 release tag 和名字
          TAG="daily-$(date -u +%Y%m%dT%H%M%SZ)"
          NAME="Daily Fine-tune @ $(date -u +%Y-%m-%d %H:%M UTC)"
          # 生成 release body(从训练/评估摘要 + 历史 release 链接)
          BODY=$(python - <<'PY'
          import json, os, datetime
          ts = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")
          lines = [f"## Daily Fine-tune @ {ts}", ""]
          try:
              with open("output/training_log.json", "r", encoding="utf-8") as f:
                  tr = json.load(f)
              lines.append("### 训练")
              lines.append(f"- mode: `{tr.get('mode')}`")
              lines.append(f"- base: `{tr.get('model_name')}`")
              lines.append(f"- epochs: {tr.get('epochs')}, bs: {tr.get('batch_size')}, lr: {tr.get('learning_rate')}")
              lines.append(f"- 语料文件数: {tr.get('n_corpus_files')},样本数: {tr.get('n_samples')}")
              lines.append(f"- 最终 loss: {tr.get('train_loss')}")
              lines.append(f"- 训练耗时: {tr.get('train_runtime_sec')}s")
          except Exception as e:
              lines.append(f"_(训练日志读取失败:{e})_")
          try:
              with open("output/eval_report.json", "r", encoding="utf-8") as f:
                  ev = json.load(f)
              lines.append("")
              lines.append("### 评估")
              for who in ("base", "finetuned"):
                  if who not in ev: continue
                  x = ev[who]
                  lines.append(f"- **{who}**: ppl={x.get('perplexity')}  top1={x.get('top1_acc')}  top5={x.get('top5_acc')}")
              cmp_ = ev.get("comparison", {})
              if cmp_ and "perplexity" in cmp_:
                  c = cmp_["perplexity"]
                  lines.append(f"- PPL 变化: {c.get('base')} → {c.get('ft')} (Δ {c.get('delta'):+.4f}, 优胜方: **{c.get('better')}**)")
          except Exception as e:
              lines.append(f"_(评估报告读取失败:{e})_")
          # 上一个 release 链接
          prev = os.environ.get("PREV_TAG")
          if prev:
              lines.append("")
              lines.append(f"### 起点")
              lines.append(f"- 本次基于上一个 release: `{prev}`")
          lines.append("")
          lines.append("### 附件")
          lines.append(f"- `model.zip` — 完整 HF 模型 + tokenizer,直接 `transformers.AutoModelForMaskedLM.from_pretrained` 加载")
          lines.append(f"- `eval_report.json` — PPL / top-k 准确率 / fill-mask 样例")
          lines.append(f"- `training_log.json` — 训练指标 + MoMo/LoRA 参数")
          print("\n".join(lines))
          PY
          )
          echo ">>>>> 创建 release: ${TAG}"
          echo "${BODY}" | gh release create "${TAG}" \
            "${ZIP_NAME}" \
            "output/eval_report.json" \
            "output/training_log.json" \
            --title "${NAME}" \
            --notes "${BODY}" \
            --target main
          echo "<<<<< release ${TAG} created: https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}"

      # ---------- 12. commit 数据 / manifest / 日志 回到 main ----------
      - name: Commit data + logs back to main
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 拉取的新数据 + manifest + 日志一起 commit
          git add data/extra_corpora/ data/used_datasets.json logs/history/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(training+eval): log @ $(date -u +%FT%TZ)"
            git push
            echo "Pushed data + logs to main."
          fi

      # ---------- 13. 可选:推送到 HuggingFace Hub ----------
      - name: Push to HuggingFace Hub
        if: |
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.push_to_hub == 'true' &&
          env.HF_TOKEN != ''
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_DISABLE_PROGRESS_BARS: '1'
        run: |
          set -euo pipefail
          HUB_REPO="${{ github.event.inputs.hub_repo_id }}"
          if [ -z "$HUB_REPO" ]; then
            echo "::error::hub_repo_id 未填,无法推送"
            exit 1
          fi
          python - <<PY
          import os
          from huggingface_hub import HfApi, create_repo
          token = os.environ['HF_TOKEN']
          repo_id = "$HUB_REPO"
          api = HfApi(token=token)
          create_repo(repo_id, token=token, exist_ok=True, repo_type='model', private=False)
          api.upload_folder(
              folder_path='./output',
              repo_id=repo_id,
              repo_type='model',
              commit_message='Daily fine-tune + eval @ ' + os.popen('date -u +%FT%TZ').read().strip(),
          )
          print(f'Pushed to https://huggingface.co/{repo_id}')
          PY
